name: Daily ETF Holdings Scraper

on:
  schedule:
    # 台灣時間 18:30 (10:30 UTC) 每日執行，此時通常已經公告盤後淨值與持股
    - cron: '30 10 * * *'
    # 一次性排程：補發今日日報（UTC 14:56 / 台灣時間 22:56）
    - cron: '56 14 21 4 *'
  # 允許手動觸發工作流
  workflow_dispatch:

jobs:
  scrape-and-notify:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # 必須使用 Personal Access Token 或設定權限允許 push
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run Scraper and Send Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: npm start

      - name: Commit state and data changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add state.json data/ dashboard/public/data/
          if ! git diff --staged --quiet; then
            git commit -m "chore: update ETF state & data [skip ci]"
          else
            echo "No changes to commit."
          fi

      - name: Push new state to repository
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}

      - name: Build Dashboard (Vite)
        run: |
          cd dashboard
          npm ci
          npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dashboard/dist
